name: Release

on:
  push:
    branches: [main]
  # Manual runs from the Actions UI (e.g. to open/refresh the Version
  # Packages PR without waiting for a merge).
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    if: github.repository == 'imnsco/DurableWS'
    # Must match the npm Trusted Publisher registration (repo + workflow
    # file + environment); the OIDC token carries the environment claim.
    #
    # No publish gate needed: with changesets pending this only maintains
    # the "Version Packages" PR — the deliberate human act of merging that
    # PR is what publishes. Emergency stop: Actions UI → Release →
    # "Disable workflow".
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          # The changesets action pushes through git, which uses the
          # credentials checkout persists — not the action's env token. The
          # PAT must live here for the Version PR branch push to be a
          # real-user event (which is what makes its CI checks run).
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      # Trusted publishing requires npm >= 11.5.1; pin latest rather than
      # trusting whatever the Node image bundles.
      # No registry-url/.npmrc token setup: with no token present, npm
      # authenticates via the runner's OIDC token and attaches provenance
      # automatically.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # With pending changesets: opens/updates the "Version Packages" PR.
      # Without (i.e. the Version PR just merged): builds and publishes to
      # npm under the dist-tag changesets derives from pre mode ("alpha").
      - name: Version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          publish: pnpm release:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # RELEASE_TOKEN: a fine-grained PAT (this repo only; contents +
          # pull-requests write — deliberately NO workflows permission).
          # The built-in GITHUB_TOKEN cannot be used here: its pushes never
          # trigger workflows (GitHub's recursion guard), so the Version PR
          # would open without its required checks. A real credential's
          # pushes fire CI normally and the PR arrives mergeable.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
